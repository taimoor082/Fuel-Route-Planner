<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Route Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #app { display: flex; height: 100vh; }
    #sidebar { width: 340px; padding: 20px; overflow-y: auto; background: #f8f9fa; border-right: 1px solid #dee2e6; }
    #map { flex: 1; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 10px 0 4px; }
    input { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
    button { width: 100%; margin-top: 14px; padding: 10px; background: #0d6efd; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    button:disabled { background: #9ec5fe; cursor: wait; }
    #error { color: #dc3545; font-size: 13px; margin-top: 10px; }
    #summary { margin-top: 18px; font-size: 14px; line-height: 1.6; }
    .stop { background: #fff; border: 1px solid #dee2e6; border-radius: 4px; padding: 10px; margin-top: 8px; font-size: 13px; }
    .stop .price { color: #198754; font-weight: 600; }
    .total { font-size: 16px; font-weight: 700; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h1>Fuel Route Planner</h1>
      <form id="route-form">
        <label for="start">Start</label>
        <input id="start" placeholder="e.g. Los Angeles, CA" value="Los Angeles, CA">
        <label for="finish">Finish</label>
        <input id="finish" placeholder="e.g. New York, NY" value="New York, NY">
        <button id="submit" type="submit">Plan route</button>
      </form>
      <div id="error"></div>
      <div id="summary"></div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([39.5, -98.35], 4);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let routeLayer = L.layerGroup().addTo(map);

    document.getElementById('route-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = document.getElementById('submit');
      const errorBox = document.getElementById('error');
      const summaryBox = document.getElementById('summary');
      button.disabled = true;
      errorBox.textContent = '';
      summaryBox.innerHTML = '';

      const params = new URLSearchParams({
        start: document.getElementById('start').value,
        finish: document.getElementById('finish').value,
      });

      try {
        const response = await fetch(`/api/route/?${params}`);
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || JSON.stringify(data));
        }
        render(data);
      } catch (err) {
        errorBox.textContent = err.message;
      } finally {
        button.disabled = false;
      }
    });

    function render(data) {
      routeLayer.clearLayers();

      const line = L.geoJSON(data.route.geometry, { style: { color: '#0d6efd', weight: 4 } });
      routeLayer.addLayer(line);
      map.fitBounds(line.getBounds(), { padding: [30, 30] });

      L.marker([data.start.latitude, data.start.longitude]).bindPopup('Start').addTo(routeLayer);
      L.marker([data.finish.latitude, data.finish.longitude]).bindPopup('Finish').addTo(routeLayer);

      for (const stop of data.fuel_stops) {
        L.circleMarker([stop.latitude, stop.longitude], {
          radius: 7, color: '#198754', fillColor: '#198754', fillOpacity: 0.9
        }).bindPopup(
          `<b>${stop.name}</b><br>${stop.city}, ${stop.state}<br>` +
          `$${stop.price_per_gallon.toFixed(3)}/gal &middot; ${stop.gallons_purchased} gal &middot; $${stop.fuel_cost_usd.toFixed(2)}`
        ).addTo(routeLayer);
      }

      const s = data.summary;
      let html = `
        <div><b>${data.route.distance_miles.toLocaleString()}</b> miles,
        ~${data.route.duration_hours} hours driving</div>
        <div class="total">Total fuel cost: $${s.total_fuel_cost_usd.toLocaleString()}</div>
        <div>${s.number_of_stops} fuel stop(s), ${s.total_gallons_purchased.toLocaleString()} gallons</div>`;
      data.fuel_stops.forEach((stop, i) => {
        html += `
          <div class="stop">
            <b>${i + 1}. ${stop.name}</b><br>
            ${stop.city}, ${stop.state} &middot; mile ${stop.miles_from_start}<br>
            <span class="price">$${stop.price_per_gallon.toFixed(3)}/gal</span>
            &middot; ${stop.gallons_purchased} gal &middot; $${stop.fuel_cost_usd.toFixed(2)}
          </div>`;
      });
      document.getElementById('summary').innerHTML = html;
    }
  </script>
</body>
</html>
